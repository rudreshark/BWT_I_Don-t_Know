
{% extends 'layout.html' %}

{% block content %}
    <div class="workstation-container">
        <div class="watermark">{{ user_id }}</div>
        <h1>Secure Workstation</h1>
        <p>This is the secure workstation. All activity is monitored.</p>
        <textarea id="secure-textarea" rows="20" cols="80"></textarea>
    </div>

    <script>
        // Disable right-click
        document.addEventListener('contextmenu', event => event.preventDefault());

        // Disable PrintScreen and Ctrl+P
        document.addEventListener('keydown', function(e) {
            if (e.key === 'PrintScreen' || (e.ctrlKey && e.key === 'p')) {
                e.preventDefault();
            }
        });

        // Blur on tab switch
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                document.body.style.filter = 'blur(5px)';
            } else {
                document.body.style.filter = 'none';
            }
        });

        // Auto-lock after token expiry
        const tokenExpiry = new Date('{{ token_expiry }}');
        const now = new Date();

        if (tokenExpiry > now) {
            const timeRemaining = tokenExpiry.getTime() - now.getTime();
            setTimeout(() => {
                // Lock the session
                document.getElementById('secure-textarea').disabled = true;
                alert('Your session has expired.');
                // Optionally, redirect to another page
                // window.location.href = "{{ url_for('employee_dashboard') }}";
            }, timeRemaining);
        } else {
            document.getElementById('secure-textarea').disabled = true;
        }
    </script>
{% endblock %}
